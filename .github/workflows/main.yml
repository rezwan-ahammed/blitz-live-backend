name: Blitz Live AI Scraper

on:
  schedule:
    # প্রতি ৩ ঘণ্টা পরপর নিজে নিজে রান হবে
    - cron: '0 */3 * * *'
  workflow_dispatch: # যাতে আপনি চাইলে ম্যানুয়ালি বাটন টিপে রান করতে পারেন

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ২০২৬-এর নোড ওয়ার্নিং সরানোর জন্য এনভায়রনমেন্ট সেটআপ
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      - name: Commit and Push live.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.json
          # পরিবর্তন না থাকলে এরর এড়াতে exit 0 ব্যবহার করা হয়েছে
          git commit -m "AI Update: live.json updated" || exit 0
          # কনফ্লিক্ট এড়াতে জোর করে পুশ (Force Push) করা হচ্ছে
          git push --force origin main
