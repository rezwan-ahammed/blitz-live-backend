name: Blitz Live AI Scraper

on:
  schedule:
    # প্রতি ৩ ঘণ্টা পরপর অটোমেটিক রান হবে (UTC সময়)
    - cron: '0 */3 * * *'
  workflow_dispatch: # যাতে আপনি চাইলে ম্যানুয়ালিও রান করতে পারেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      - name: Commit and Push live.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.json
          git commit -m "AI Update: live.json updated" || exit 0
          git push
